<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Andah Games</title>
    <style>
        body { 
            font-family: sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            background: #414547;
            color: white; 
            margin: 0;
            min-height: 100vh;
        }

        #main-container { 
            min-width: 350px; 
            max-width: 500px; 
            text-align: center; 
            background: #333333;
            padding: 30px; 
            border-radius: 15px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h1 {
            margin-bottom: 30px;
        }

        .game-button {
            display: block;
            width: 100%;
            padding: 15px; 
            margin: 10px 0;
            cursor: pointer; 
            border: none; 
            border-radius: 8px; 
            background: #007bff; 
            color: white; 
            font-weight: bold; 
            font-size: 1.2rem;
            text-decoration: none;
            transition: transform 0.1s, background 0.2s;
        }

        .game-button:hover { background: #0056b3; transform: scale(1.02); }
        .game-button:active { transform: scale(0.98); }
    </style>
</head>
<body>

<div id="main-container">
    <h1>Welcome to Andah Games</h1>
    <p>Choose a game to play:</p>
    <a href="flag-quiz.html" class="game-button">Flag Quiz</a>
    <!-- Add more games here -->
</div>

</body>
</html>
