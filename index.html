<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fictional Nation Flag Quiz</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #222; color: white; }
        #game-container { max-width: 500px; text-align: center; margin-top: 50px; background: #333; padding: 20px; border-radius: 15px; }
        #flag-display { display: flex; align-items: center; justify-content: center; width: 320px; height: 220px; background: #444; margin: 0 auto 20px; padding: 10px; border-radius: 12px; }
        #flag-outline { display: inline-flex; align-items: center; justify-content: center; padding: 4px; border: 4px solid #555; border-radius: 8px; background: #444; line-height: 0; max-width: 100%; max-height: 100%; }
        #flag-img { display: block; width: auto; height: auto; max-width: 100%; max-height: 100%; }
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { padding: 15px; cursor: pointer; border: none; border-radius: 5px; background: #007bff; color: white; font-weight: bold; }
        button:hover { background: #0056b3; }
        .correct { background: #28a745 !important; }
        .wrong { background: #dc3545 !important; }
        #score { margin-top: 20px; font-size: 1.2rem; }
        #highscore { margin-top: 10px; font-size: 1rem; color: #bbb; }
    </style>
</head>
<body>

<div id="game-container">
    <h1>Nation Quiz</h1>
    <div id="flag-display">
        <div id="flag-outline">
            <img id="flag-img" src="" alt="Flag">
        </div>
    </div>
    <div id="options" class="options"></div>
    <div id="score">Score: 0</div>
    <div id="highscore">High Score: 0</div>
</div>

<script>
    // 1. YOUR LIST OF 172 NATIONS
    const nations = [
        "Dahe", "Areoix Lie", "Raledria", "Pelugrotoa", "Estijan", "Ztesh", "Emara", "Etirha", "Inania", "Lycroa", "United Delet", "Quidic", "Verusa", "Ukhdari", "Ealdorii", "Seytinemas", "Sunsokua", "New Misos", "Ashain", "Wundry", "Vayvele", "Vesozata", "Taval", "Dual Cenryia", "Verste", "Sanagara", "Easuhura", "Siana", "Suenan", "Praesyu", "Terressin", "Pelines", "Myla", "Trian", "Ahokini", "Finae", "Erkizil", "Ohtina", "Oyreain", "Desaki", "Merela Sta", "Etretes", "Anymna", "Yaxuto", "Genaire", "Selaja", "Darewa", "Astye", "Otiiric", "Isnti", "Lydroa", "Chaenia", "Sadain", "Ocaun", "Haiza", "Heiso", "Hkuqo", "United Mihili", "Iareva", "Volver", "North Ayre", "Acrana", "Gaeiya", "Sivoso", "Maalle", "Deschon", "Isari", "Laselteh", "Fermori", "Acetoa", "Ucrua", "Umarcia", "Kusierna", "Arbiya", "Iainoa", "Phuris", "Mendereide", "Nia", "Disal Nila", "Iquir", "Eldavpir", "Nheyes Si", "Othya", "Exilium", "Eldjo", "Oscairia", "Feio Lie", "Lieri", "Reerica", "Pelan", "Prstreula", "Jshain", "Onphello", "Ruylku", "Curata", "Fire Coast", "Pha Hii", "Uularin", "Ilicuhe", "Viussi", "Kaastini", "Fincen", "Galca", "Zenashan", "Rijan bu", "Palina", "Mesjan Hyaa", "Taoisia", "Shinam", "Ihner", "Grazail", "Prystr Hii", "Yihnurda", "Taing", "Jathua", "Andsaudare", "Ozinia", "Taniduna", "Byllu", "Candenat", "Jau", "Umendel", "Inrea", "lasri", "Baluyde", "Rtesania", "Peka", "Tomscilus", "Eparia", "Walporein", "Aetintio", "Slyiaduun", "Ikzen", "Crila Republic", "Sattle", "Pruim Fijan", "Welenu Fana", "Saa", "Guise", "Aplasia", "Danocia", "Koruch", "Canldives", "Yutnitu", "Migoku", "Hyelen", "Stinebar", "Amcha", "Urbiqu", "Metndria", "New Kizura", "Veelmit", "Niretui and Anulan", "Rinew", "Zhanshe", "Yoprioq", "Elja and Munusia", "Shomjind", "Niul Spijan", "Rkmepuia", "Hiwush", "Western Migoku", "Cloja", "Rethern", "Enina", "Far Lands", "Tonder", "Isuibul", "Letan", "Tvecoca", "Trevilla", "Cruthi Anoso"
    ];

    let score = 0;
    let highScore = 0;
    let correctAnswer = "";

    function loadHighScore() {
        const stored = localStorage.getItem('nationQuizHighScore');
        highScore = stored ? Number(stored) : 0;
    }

    function saveHighScore() {
        localStorage.setItem('nationQuizHighScore', highScore);
    }

    function updateScoreDisplay() {
        document.getElementById('score').innerText = `Score: ${score}`;
        document.getElementById('highscore').innerText = `High Score: ${highScore}`;
    }

    function initGame() {
        // Shuffle and pick 4 nations
        const shuffled = [...nations].sort(() => 0.5 - Math.random());
        const choices = shuffled.slice(0, 4);
        correctAnswer = choices[Math.floor(Math.random() * 4)];

        // Set the image
        // IMPORTANT: This looks for a folder named "flags" with files like "Dahe.png"
        const imgElement = document.getElementById('flag-img');
        imgElement.src = `flags/${correctAnswer}.png`;
        
        // If image fails to load (because you haven't made it yet), show text
        imgElement.onerror = function() {
            this.src = `https://via.placeholder.com/300x180/444/fff?text=${correctAnswer}`;
        };

        // Create buttons
        const optionsDiv = document.getElementById('options');
        optionsDiv.innerHTML = "";
        choices.forEach(name => {
            const btn = document.createElement('button');
            btn.innerText = name;
            btn.onclick = () => checkAnswer(btn, name);
            optionsDiv.appendChild(btn);
        });
    }

    function checkAnswer(btn, name) {
        const buttons = document.querySelectorAll('button');
        buttons.forEach(b => b.disabled = true);

        if (name === correctAnswer) {
            score++;
            btn.classList.add('correct');
        } else {
            btn.classList.add('wrong');
            buttons.forEach(b => { if(b.innerText === correctAnswer) b.classList.add('correct'); });

            if (score > highScore) {
                highScore = score;
                saveHighScore();
            }
            score = 0;
        }

        updateScoreDisplay();
        setTimeout(initGame, 1500);
    }

    loadHighScore();
    updateScoreDisplay();
    initGame();
</script>
</body>
</html>
