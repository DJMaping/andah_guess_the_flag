<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Capital Quiz — Andah Games</title>
    <script>
        (function () {
            try {
                var saved = localStorage.getItem('andah-theme');
                var theme = saved || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
                document.documentElement.setAttribute('data-theme', theme);
            } catch (e) {
                document.documentElement.setAttribute('data-theme', 'light');
            }
        })();
    </script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="site-bar">
    <div class="site-bar-inner">
        <a class="site-brand" href="index.html">Andah Games</a>
        <nav class="site-nav" aria-label="Site">
            <a href="index.html">Main page</a>
            <button type="button" class="theme-toggle" aria-label="Toggle theme">☾ Dark</button>
        </nav>
    </div>
</header>

<div class="page-shell">
    <article class="page-card">
        <div class="page-header">
            <p class="eyebrow">From the Andah Capital Quiz collection</p>
            <h1 class="huge-title">Capital Quiz</h1>
            <p class="subtitle">Pick the correct capital city for the country shown.</p>
        </div>

        <div id="flag-display">
            <div id="flag-outline">
                <img id="flag-img" src="" alt="Flag">
            </div>
        </div>

        <div id="country-name" class="country-name-prompt">Country</div>
        <div id="options" class="options"></div>

        <div id="empty-state" class="result-text" style="display:none;"></div>

        <div class="score-panel">
            <div class="score-block"><label>Score</label><strong id="score">0</strong></div>
            <div class="score-block"><label>High score</label><strong id="highscore">0</strong></div>
        </div>

        <button class="back-button" type="button" onclick="window.location.href='index.html'">Back to main page</button>
    </article>

    <footer>
        <p>Data sourced from <a href="https://andah.miraheze.org/wiki/Main_Page" target="_blank" rel="noopener">Andah Miraheze Wiki</a>.</p>
        <div class="footer-meta">
            <p>Made by <strong>DJMapping</strong>.</p>
            <p>&copy; 2026 Andah Games. All rights reserved.</p>
        </div>
    </footer>
</div>

<script src="script.js"></script>
<script src="andah-capitals.js"></script>
<script>
    let score = 0;
    let highScore = 0;
    let correctCapital = "";

    function loadHighScore() {
        const stored = localStorage.getItem('capitalQuizHighScore');
        highScore = stored ? Number(stored) : 0;
    }

    function saveHighScore() {
        localStorage.setItem('capitalQuizHighScore', highScore);
    }

    function updateScoreDisplay() {
        document.getElementById('score').innerText = score;
        document.getElementById('highscore').innerText = highScore;
    }

    function getFlagUrl(name) {
        return `flags/${encodeURIComponent(name)}.png`;
    }

    function getValidEntries() {
        return (typeof andahCapitals !== 'undefined' ? andahCapitals : [])
            .filter(c => c && c.name && c.capital);
    }

    function showEmptyState(count) {
        document.getElementById('flag-display').style.display = 'none';
        document.getElementById('country-name').style.display = 'none';
        document.getElementById('options').style.display = 'none';
        const empty = document.getElementById('empty-state');
        empty.style.display = 'block';
        empty.innerHTML = `The Capital Quiz needs at least 4 entries in <code>andah-capitals.js</code> to play. Currently filled in: <strong>${count}</strong>.`;
    }

    function initGame() {
        const valid = getValidEntries();
        if (valid.length < 4) {
            showEmptyState(valid.length);
            return;
        }

        const shuffled = [...valid].sort(() => 0.5 - Math.random());
        const choices = shuffled.slice(0, 4);
        const target = choices[Math.floor(Math.random() * 4)];
        correctCapital = target.capital;

        document.getElementById('country-name').innerText = target.name;
        const imgElement = document.getElementById('flag-img');
        imgElement.src = getFlagUrl(target.name);
        imgElement.onerror = function() {
            this.style.visibility = 'hidden';
        };
        imgElement.onload = function() {
            this.style.visibility = 'visible';
        };

        // Build a list of distinct capital options. The 4 chosen countries
        // already differ by name; their capitals should also be distinct in
        // a well-formed dataset.
        const optionsDiv = document.getElementById('options');
        optionsDiv.innerHTML = '';
        choices.forEach(entry => {
            const btn = document.createElement('button');
            btn.className = 'option-button';
            btn.innerText = entry.capital;
            btn.onclick = () => checkAnswer(btn, entry.capital);
            optionsDiv.appendChild(btn);
        });
    }

    function checkAnswer(btn, capital) {
        const buttons = document.querySelectorAll('.option-button');
        buttons.forEach(b => b.disabled = true);

        if (capital === correctCapital) {
            score++;
            btn.classList.add('correct');
        } else {
            btn.classList.add('wrong');
            buttons.forEach(b => { if (b.innerText === correctCapital) b.classList.add('correct'); });
            if (score > highScore) {
                highScore = score;
                saveHighScore();
            }
            score = 0;
        }
        updateScoreDisplay();
        setTimeout(initGame, 1300);
    }

    loadHighScore();
    updateScoreDisplay();
    initGame();
</script>
</body>
</html>
