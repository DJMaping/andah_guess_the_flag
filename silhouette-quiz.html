<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Silhouette Flag Quiz — Andah Games</title>
    <script>
        (function () {
            try {
                var saved = localStorage.getItem('andah-theme');
                var theme = saved || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
                document.documentElement.setAttribute('data-theme', theme);
            } catch (e) {
                document.documentElement.setAttribute('data-theme', 'light');
            }
        })();
    </script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="site-bar">
    <div class="site-bar-inner">
        <a class="site-brand" href="index.html">Andah Games</a>
        <nav class="site-nav" aria-label="Site">
            <a href="index.html">Main page</a>
            <button type="button" class="theme-toggle" aria-label="Toggle theme">☾ Dark</button>
        </nav>
    </div>
</header>

<div class="page-shell">
    <article class="page-card">
        <div class="page-header">
            <p class="eyebrow">From the Andah Flag Quiz collection</p>
            <h1 class="huge-title">Silhouette Flag Quiz</h1>
            <p class="subtitle">A blurred version of the flag is shown below. Identify the country from its rough colour pattern.</p>
        </div>

        <div class="mode-tabs" aria-label="Difficulty">
            <button class="mode-tab" data-mode="easy" type="button">Easy</button>
            <button class="mode-tab" data-mode="medium" type="button">Medium</button>
            <button class="mode-tab" data-mode="hard" type="button">Hard</button>
        </div>

        <div id="flag-display">
            <div id="flag-outline">
                <img id="flag-img" class="silhouette--medium" src="" alt="Blurred flag">
            </div>
        </div>

        <div id="options" class="options"></div>

        <div class="score-panel">
            <div class="score-block"><label>Score</label><strong id="score">0</strong></div>
            <div class="score-block"><label>High score</label><strong id="highscore">0</strong></div>
        </div>

        <button class="back-button" type="button" onclick="window.location.href='index.html'">Back to main page</button>
    </article>

    <footer>
        <p>Data sourced from <a href="https://andah.miraheze.org/wiki/Main_Page" target="_blank" rel="noopener">Andah Miraheze Wiki</a>.</p>
        <div class="footer-meta">
            <p>Made by <strong>DJMapping</strong>.</p>
            <p>&copy; 2026 Andah Games. All rights reserved.</p>
        </div>
    </footer>
</div>

<script src="script.js"></script>
<script>
    const nations = ["Dahe", "Areoix Lie", "Raledria", "Pelugrotoa", "Estijan", "Ztesh", "Emara", "Etirha", "Inania", "Lycroa", "United Delet", "Quidic", "Verusa", "Ukhdari", "Ealdorii", "Seytinemas", "Sunsokua", "New Misos", "Ashain", "Wundry", "Vayvele", "Vesozata", "Taval", "Dual Cenryia", "Verste", "Sanagara", "Easuhura", "Siana", "Suenan", "Praesyu", "Terressin", "Pelines", "Myla", "Trian", "Ahokini", "Finae", "Erkizil", "Ohtina", "Oyreain", "Desaki", "Merela Sta", "Etretes", "Anymna", "Yaxuto", "Genaire", "Selaja", "Darewa", "Astye", "Otiiric", "Isnti", "Lydroa", "Chaenia", "Sadain", "Ocaun", "Haiza", "Heiso", "Hkuqo", "United Mihili", "Iareva", "Volver", "North Ayre", "Acrana", "Gaeiya", "Sivoso", "Maalle", "Deschon", "Isari", "Laselteh", "Fermori", "Acetoa", "Ucrua", "Umarcia", "Kusierna", "Arbiya", "Iainoa", "Phuris", "Mendereide", "Nia", "Disal Nila", "Iquir", "Eldavpir", "Nheyes Si", "Othya", "Exilium", "Eldjo", "Oscairia", "Feio Lie", "Lieri", "Reerica", "Pelan", "Prstreula", "Jshain", "Onphello", "Ruylku", "Curata", "Fire Coast", "Pha Hii", "Uularin", "Ilicuhe", "Viussi", "Kaastini", "Fincen", "Galca", "Zenashan", "Rijan bu", "Palina", "Mesjan Hyaa", "Taoisia", "Shinam", "Ihner", "Grazail", "Prystr Hii", "Yihnurda", "Taing", "Jathua", "Andsaudare", "Ozinia", "Taniduna", "Byllu", "Candenat", "Jau", "Umendel", "Inrea", "lasri", "Baluyde", "Rtesania", "Peka", "Tomscilus", "Eparia", "Walporein", "Aetintio", "Slyiaduun", "Ikzen", "Crila Republic", "Sattle", "Pruim Fijan", "Welenu Fana", "Saa", "Guise", "Aplasia", "Danocia", "Koruch", "Canldives", "Yutnitu", "Migoku", "Hyelen", "Stinebar", "Amcha", "Urbiqu", "Metndria", "New Kizura", "Veelmit", "Niretui and Anulan", "Rinew", "Zhanshe", "Yoprioq", "Elja and Munusia", "Shomjind", "Niul Spijan", "Rkmepuia", "Hiwush", "Western Migoku", "Cloja", "Rethern", "Enina", "Far Lands", "Tonder", "Isuibul", "Letan", "Tvecoca", "Trevilla", "Cruthi Anoso"];

    const difficulties = {
        easy: { highScoreKey: 'silhouetteEasyHighScore', cssClass: 'silhouette--easy' },
        medium: { highScoreKey: 'silhouetteMediumHighScore', cssClass: 'silhouette--medium' },
        hard: { highScoreKey: 'silhouetteHardHighScore', cssClass: 'silhouette--hard' }
    };

    let mode = new URLSearchParams(window.location.search).get('mode');
    if (!difficulties[mode]) mode = 'medium';

    let score = 0;
    let highScore = 0;
    let correctAnswer = "";

    function loadHighScore() {
        const stored = localStorage.getItem(difficulties[mode].highScoreKey);
        highScore = stored ? Number(stored) : 0;
    }

    function saveHighScore() {
        localStorage.setItem(difficulties[mode].highScoreKey, highScore);
    }

    function updateScoreDisplay() {
        document.getElementById('score').innerText = score;
        document.getElementById('highscore').innerText = highScore;
    }

    function setMode(nextMode) {
        mode = nextMode;
        score = 0;
        loadHighScore();
        updateScoreDisplay();
        document.querySelectorAll('.mode-tab').forEach(b => {
            b.classList.toggle('active', b.dataset.mode === mode);
        });
        const url = new URL(window.location.href);
        url.searchParams.set('mode', mode);
        history.replaceState(null, '', url);
        initGame();
    }

    function initGame() {
        const shuffled = [...nations].sort(() => 0.5 - Math.random());
        const choices = shuffled.slice(0, 4);
        correctAnswer = choices[Math.floor(Math.random() * 4)];

        const imgElement = document.getElementById('flag-img');
        imgElement.className = difficulties[mode].cssClass;
        imgElement.src = `flags/${encodeURIComponent(correctAnswer)}.png`;
        imgElement.onerror = function() {
            this.src = `https://via.placeholder.com/250x250/222/fff?text=${correctAnswer}`;
        };

        const optionsDiv = document.getElementById('options');
        optionsDiv.innerHTML = '';
        choices.forEach(name => {
            const btn = document.createElement('button');
            btn.className = 'option-button';
            btn.innerText = name;
            btn.onclick = () => checkAnswer(btn, name);
            optionsDiv.appendChild(btn);
        });
    }

    function checkAnswer(btn, name) {
        const buttons = document.querySelectorAll('.option-button');
        buttons.forEach(b => b.disabled = true);

        // Reveal the unblurred flag while feedback shows
        const imgElement = document.getElementById('flag-img');
        imgElement.classList.remove('silhouette--easy', 'silhouette--medium', 'silhouette--hard');

        if (name === correctAnswer) {
            score++;
            btn.classList.add('correct');
        } else {
            btn.classList.add('wrong');
            buttons.forEach(b => { if (b.innerText === correctAnswer) b.classList.add('correct'); });
            if (score > highScore) {
                highScore = score;
                saveHighScore();
            }
            score = 0;
        }
        updateScoreDisplay();
        setTimeout(initGame, 1500);
    }

    document.querySelectorAll('.mode-tab').forEach(b => {
        b.addEventListener('click', () => setMode(b.dataset.mode));
    });

    setMode(mode);
</script>
</body>
</html>
