<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Flag Match Quiz</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="page-shell">
    <div class="page-card">
        <div class="page-header">
            <p class="eyebrow">Andah Flag Match</p>
            <h1 class="huge-title">Guess Flag Name</h1>
            <p class="subtitle">Pick the correct flag for the country shown above.</p>
        </div>

        <div id="country-name" class="subtitle" style="font-size:1.45rem; color:#fff1b6; margin-bottom:18px;">Country Name</div>
        <div id="options" class="flags-grid"></div>

        <div class="score-panel">
            <div class="score-block"><label>Score</label><strong id="score">0</strong></div>
            <div class="score-block"><label>High Score</label><strong id="highscore">0</strong></div>
        </div>

        <button class="back-button" onclick="window.location.href='index.html'">Back to Main Page</button>
    </div>

    <footer>
        <div style="margin-bottom: 12px; font-size: 0.9rem;">
            <p style="margin: 0 0 6px;">Data sourced from <a href="https://andah.miraheze.org/wiki/Main_Page" target="_blank">Andah Miraheze Wiki</a></p>
        </div>
        <div style="border-top: 1px solid rgba(255,255,255,0.12); padding-top: 12px; font-size: 0.85rem; color: #8b96b8;">
            <p style="margin: 0;">Made by <strong>DJMapping</strong></p>
            <p style="margin: 4px 0 0;">© 2026 Andah Games. All rights reserved.</p>
        </div>
    </footer>
</div>

<script>
    const nations = ["Dahe", "Areoix Lie", "Raledria", "Pelugrotoa", "Estijan", "Ztesh", "Emara", "Etirha", "Inania", "Lycroa", "United Delet", "Quidic", "Verusa", "Ukhdari", "Ealdorii", "Seytinemas", "Sunsokua", "New Misos", "Ashain", "Wundry", "Vayvele", "Vesozata", "Taval", "Dual Cenryia", "Verste", "Sanagara", "Easuhura", "Siana", "Suenan", "Praesyu", "Terressin", "Pelines", "Myla", "Trian", "Ahokini", "Finae", "Erkizil", "Ohtina", "Oyreain", "Desaki", "Merela Sta", "Etretes", "Anymna", "Yaxuto", "Genaire", "Selaja", "Darewa", "Astye", "Otiiric", "Isnti", "Lydroa", "Chaenia", "Sadain", "Ocaun", "Haiza", "Heiso", "Hkuqo", "United Mihili", "Iareva", "Volver", "North Ayre", "Acrana", "Gaeiya", "Sivoso", "Maalle", "Deschon", "Isari", "Laselteh", "Fermori", "Acetoa", "Ucrua", "Umarcia", "Kusierna", "Arbiya", "Iainoa", "Phuris", "Mendereide", "Nia", "Disal Nila", "Iquir", "Eldavpir", "Nheyes Si", "Othya", "Exilium", "Eldjo", "Oscairia", "Feio Lie", "Lieri", "Reerica", "Pelan", "Prstreula", "Jshain", "Onphello", "Ruylku", "Curata", "Fire Coast", "Pha Hii", "Uularin", "Ilicuhe", "Viussi", "Kaastini", "Fincen", "Galca", "Zenashan", "Rijan bu", "Palina", "Mesjan Hyaa", "Taoisia", "Shinam", "Ihner", "Grazail", "Prystr Hii", "Yihnurda", "Taing", "Jathua", "Andsaudare", "Ozinia", "Taniduna", "Byllu", "Candenat", "Jau", "Umendel", "Inrea", "lasri", "Baluyde", "Rtesania", "Peka", "Tomscilus", "Eparia", "Walporein", "Aetintio", "Slyiaduun", "Ikzen", "Crila Republic", "Sattle", "Pruim Fijan", "Welenu Fana", "Saa", "Guise", "Aplasia", "Danocia", "Koruch", "Canldives", "Yutnitu", "Migoku", "Hyelen", "Stinebar", "Amcha", "Urbiqu", "Metndria", "New Kizura", "Veelmit", "Niretui and Anulan", "Rinew", "Zhanshe", "Yoprioq", "Elja and Munusia", "Shomjind", "Niul Spijan", "Rkmepuia", "Hiwush", "Western Migoku", "Cloja", "Rethern", "Enina", "Far Lands", "Tonder", "Isuibul", "Letan", "Tvecoca", "Trevilla", "Cruthi Anoso"];

    let score = 0;
    let highScore = 0;
    let correctAnswer = "";

    function loadHighScore() {
        const stored = localStorage.getItem('flagNameQuizHighScore');
        highScore = stored ? Number(stored) : 0;
    }

    function saveHighScore() {
        localStorage.setItem('flagNameQuizHighScore', highScore);
    }

    function updateScoreDisplay() {
        document.getElementById('score').innerText = score;
        document.getElementById('highscore').innerText = highScore;
    }

    function getFlagUrl(name) {
        return `flags/${encodeURIComponent(name)}.png`;
    }

    function initGame() {
        const shuffled = [...nations].sort(() => 0.5 - Math.random());
        const choices = shuffled.slice(0, 4);
        correctAnswer = choices[Math.floor(Math.random() * 4)];

        document.getElementById('country-name').innerText = correctAnswer;

        const optionsDiv = document.getElementById('options');
        optionsDiv.innerHTML = '';

        choices.forEach(name => {
            const btn = document.createElement('button');
            btn.className = 'flag-btn';
            btn.dataset.name = name;
            btn.onclick = () => checkAnswer(btn, name);

            const img = document.createElement('img');
            img.src = getFlagUrl(name);
            img.alt = name;
            img.onerror = function() {
                this.src = `https://via.placeholder.com/260x160/1f2d3b/ffffff?text=${encodeURIComponent(name)}`;
            };

            btn.appendChild(img);
            optionsDiv.appendChild(btn);
        });
    }

    function checkAnswer(btn, name) {
        const buttons = document.querySelectorAll('#options .flag-btn');
        buttons.forEach(b => b.disabled = true);

        if (name === correctAnswer) {
            score++;
            btn.classList.add('correct');
        } else {
            btn.classList.add('wrong');
            buttons.forEach(b => {
                if (b.dataset.name === correctAnswer) b.classList.add('correct');
            });
            if (score > highScore) {
                highScore = score;
                saveHighScore();
            }
            score = 0;
        }

        updateScoreDisplay();
        setTimeout(initGame, 1200);
    }

    loadHighScore();
    updateScoreDisplay();
    initGame();
</script>
</body>
</html>
